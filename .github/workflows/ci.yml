name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install linters
        run: brew install swiftlint swiftformat

      - name: SwiftFormat
        run: swiftformat --lint Bridge/Sources iOS/CursorRemote Shared

      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml

  bridge:
    name: Mac bridge
    needs: lint
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release
        run: |
          cd Bridge
          swift build -c release

      - name: Build debug
        run: |
          cd Bridge
          swift build -c debug

  ios:
    name: iOS app
    needs: lint
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd iOS
          xcodegen generate

      - name: Build for iOS Simulator
        run: |
          cd iOS
          xcodebuild \
            -project CursorRemote.xcodeproj \
            -scheme CursorRemote \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
