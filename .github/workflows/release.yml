name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bridge:
    name: Mac bridge binary
    runs-on: macos-26
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release
        run: |
          cd Bridge
          swift build -c release
          mkdir -p dist
          cp .build/release/CursorBridge dist/CursorBridge
          chmod +x dist/CursorBridge

      - name: Package archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd Bridge/dist
          tar -czf "../../CursorBridge-${TAG}-macos-arm64.tar.gz" CursorBridge
          shasum -a 256 "../../CursorBridge-${TAG}-macos-arm64.tar.gz" > "../../CursorBridge-${TAG}-macos-arm64.tar.gz.sha256"

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: CursorBridge-macos-arm64
          path: |
            CursorBridge-*.tar.gz
            CursorBridge-*.sha256

  github-release:
    name: GitHub Release
    needs: bridge
    runs-on: ubuntu-latest
    steps:
      - name: Download bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: CursorBridge-macos-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CursorBridge-*.tar.gz
            CursorBridge-*.sha256
          generate_release_notes: true
