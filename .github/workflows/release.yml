name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bridge-dmg:
    name: Mac bridge DMG (${{ matrix.arch }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and package DMG
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x scripts/package-bridge-dmg.sh
          ./scripts/package-bridge-dmg.sh "${GITHUB_REF_NAME}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CursorBridge-dmg-${{ matrix.arch }}
          path: |
            CursorBridge-*-macos-${{ matrix.arch }}.dmg
            CursorBridge-*-macos-${{ matrix.arch }}.dmg.sha256

  github-release:
    name: GitHub Release
    needs: bridge-dmg
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/**
          generate_release_notes: true
          body: |
            ## Install (Mac)

            1. Download the DMG for your Mac:
               - **Apple Silicon (M1/M2/M3/M4):** `CursorBridge-*-macos-arm64.dmg`
               - **Intel:** `CursorBridge-*-macos-x86_64.dmg`
            2. Open the DMG and drag **CursorBridge** to **Applications**.
            3. Launch from Applications. On first run, grant **Accessibility** when prompted.
            4. Click the menu bar icon and use **Copy pairing JSON** for the iOS app.

            The bridge listens on port `8742` by default. Auth token is stored at `~/.cursor-bridge/token.txt`.
