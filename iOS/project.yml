name: CursorRemote
options:
  bundleIdPrefix: com.jubblin.app
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  CursorRemote:
    type: application
    platform: iOS
    sources:
      - path: CursorRemote
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.jubblin.app.cursorremote
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Connect to Cursor Bridge on your Mac"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan the QR code from Cursor Bridge on your Mac"
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: CursorRemote/CursorRemote.entitlements
